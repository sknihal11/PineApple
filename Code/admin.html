<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - Campus Navigation System</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(34,211,238,0.14), transparent 30%),
        linear-gradient(135deg, #071226, #0a1630, #0d1b36);
      color:#eaf3ff;
      min-height:100vh;
    }

    .admin-page-header{
      max-width:1100px;
      margin:0 auto;
      padding:32px 20px 10px;
    }

    .admin-page-header h1{
      margin:0;
      font-size:38px;
      color:#ffffff;
    }

    .admin-page-header p{
      margin:8px 0 0;
      color:#c7daf5;
      font-size:15px;
    }

    .admin-container{
      max-width:1100px;
      margin:10px auto 30px;
      padding:20px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .top-bar h2{
      margin:0;
      color:#ffffff;
    }

    .muted{
      color:#cbd5e1;
      font-size:14px;
    }

    .admin-card{
      background:rgba(8,18,38,0.74);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:22px;
      padding:20px;
      margin-bottom:20px;
      text-align:left;
      box-shadow:0 16px 34px rgba(0,0,0,0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .admin-card h2{
      margin-top:0;
      color:#8ec5ff;
    }

    .admin-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:12px;
    }

    .admin-grid input,
    .admin-grid select,
    .admin-grid textarea{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border:1px solid rgba(255,255,255,0.12);
      border-radius:12px;
      font-size:14px;
      outline:none;
      background:rgba(255,255,255,0.08);
      color:#ffffff;
    }

    .admin-grid textarea{
      min-height:100px;
      resize:vertical;
    }

    .admin-grid label{
      display:block;
      margin-bottom:6px;
      color:#dbeafe;
      font-size:13px;
      font-weight:600;
    }

    .admin-grid select option{
      color:#111827;
    }

    .admin-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    button{
      padding:12px 16px;
      background:linear-gradient(135deg, #3b82f6, #22d3ee);
      border:none;
      color:white;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      transition:0.2s ease;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .small-btn{
      padding:8px 12px;
      font-size:13px;
      margin-right:6px;
    }

    .danger{
      background:#ef4444;
    }

    .danger:hover{
      background:#dc2626;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:14px;
      overflow:hidden;
      border-radius:14px;
    }

    th, td{
      padding:12px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,0.08);
      font-size:14px;
      color:#eaf3ff;
    }

    th{
      background:rgba(255,255,255,0.08);
      color:#ffffff;
    }

    tr:hover{
      background:rgba(255,255,255,0.03);
    }

    @media (max-width: 768px){
      .admin-page-header{
        padding:24px 16px 8px;
      }

      .admin-page-header h1{
        font-size:28px;
      }

      .admin-container{
        padding:16px;
      }

      .admin-card{
        padding:16px;
        border-radius:18px;
      }

      th, td{
        font-size:12px;
        padding:10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="admin-page-header">
    <div>
      <h1>Campus Navigation System</h1>
      <p>Admin Panel — Manage classrooms and indoor navigation</p>
    </div>
  </div>

  <div class="admin-container">
    <div class="top-bar">
      <div>
        <h2 style="margin:0;">Admin Dashboard</h2>
        <div class="muted">Add, edit, and delete classrooms. Changes are saved in browser local storage.</div>
      </div>
      <div class="admin-actions">
        <button onclick="goHome()">Back to Home</button>
        <button onclick="resetData()">Reset Demo Data</button>
      </div>
    </div>

    <div class="admin-card">
      <h2 id="formTitle">Add Classroom</h2>

      <div class="admin-grid">
        <input type="hidden" id="roomId" />

        <div>
          <label>Room Number</label>
          <input type="text" id="roomNumber" placeholder="CSE-201" />
        </div>

        <div>
          <label>Room Name</label>
          <input type="text" id="roomName" placeholder="CSE Classroom 201" />
        </div>

        <div>
          <label>Department</label>
          <input type="text" id="department" placeholder="CSE" />
        </div>

        <div>
          <label>Year</label>
          <select id="year">
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
          </select>
        </div>

        <div>
          <label>Section</label>
          <select id="section">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="All">All</option>
          </select>
          </div>

        <div>
          <label>Room Type</label>
          <select id="roomType">
            <option value="Classroom">Classroom</option>
            <option value="Lab">Lab</option>
            <option value="Workshop">Workshop</option>
            <option value="Faculty Room">Faculty Room</option>
            <option value="Department Office">Department Office</option>
          </select>
        </div>

        <div>
          <label>Block</label>
          <input type="text" id="block" placeholder="CSE Block" />
        </div>

        <div>
          <label>Floor</label>
          <input type="text" id="floor" placeholder="2" />
        </div>

        <div>
          <label>Landmark</label>
          <input type="text" id="landmark" placeholder="Near CSE staircase" />
        </div>

        <div>
          <label>Outdoor Target</label>
          <select id="outdoorTargetId"></select>
        </div>

        <div style="grid-column:1 / -1;">
          <label>Indoor Notes</label>
          <textarea id="indoorNotes" placeholder="Go to 2nd floor, turn left, second room on the right."></textarea>
        </div>
      </div>

      <div class="admin-actions">
        <button onclick="saveClassroom()">Save Classroom</button>
        <button onclick="clearForm()">Clear</button>
      </div>
    </div>

    <div class="admin-card">
      <h2>Saved Classrooms</h2>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Room No</th>
              <th>Name</th>
              <th>Department</th>
              <th>Year</th>
              <th>Section</th>
              <th>Type</th>
              <th>Block</th>
              <th>Floor</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="classroomTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    function populateOutdoorTargets() {
      const select = document.getElementById("outdoorTargetId");
      select.innerHTML = locations.map(loc =>
        `<option value="${loc.id}">${loc.name} (${loc.building || loc.category})</option>`
      ).join("");
    }

    function loadTable() {
      const classrooms = getClassrooms();
      const tbody = document.getElementById("classroomTableBody");

      if (!classrooms.length) {
        tbody.innerHTML = `<tr><td colspan="9">No classrooms added yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = classrooms.map(room => `
        <tr>
          <td>${room.roomNumber}</td>
          <td>${room.roomName}</td>
          <td>${room.department}</td>
          <td>${room.year || ""}</td>
          <td>${room.section || ""}</td>
          <td>${room.roomType}</td>
          <td>${room.block}</td>
          <td>${room.floor}</td>
          <td>
            <button class="small-btn" onclick="editRoom('${room.id}')">Edit</button>
            <button class="small-btn danger" onclick="deleteRoom('${room.id}')">Delete</button>
          </td>
        </tr>
      `).join("");
    }

    function saveClassroom() {
      const roomId = document.getElementById("roomId").value.trim();
      const roomNumber = document.getElementById("roomNumber").value.trim();
      const roomName = document.getElementById("roomName").value.trim();
      const department = document.getElementById("department").value.trim();
      const yearEl = document.getElementById("year");
      const sectionEl = document.getElementById("section");

      const year = yearEl ? yearEl.value : "";
      const section = sectionEl ? sectionEl.value : "";
      const roomType = document.getElementById("roomType").value;
      const block = document.getElementById("block").value.trim();
      const floor = document.getElementById("floor").value.trim();
      const landmark = document.getElementById("landmark").value.trim();
      const indoorNotes = document.getElementById("indoorNotes").value.trim();
      const outdoorTargetId = document.getElementById("outdoorTargetId").value;

      if (!roomNumber || !roomName || !department || !block || !floor || !indoorNotes) {
        alert("Please fill all important fields.");
        return;
      }

      const classrooms = getClassrooms();

      const newRoom = {
        id: roomId || (roomNumber.toLowerCase().replace(/[^a-z0-9]+/g, "-") + "-" + Date.now()),
        roomNumber,
        roomName,
        department,
        year,
        section,
        roomType,
        block,
        floor,
        landmark,
        indoorNotes,
        outdoorTargetId
      };

      const index = classrooms.findIndex(r => r.id === newRoom.id);

      if (index >= 0) {
        classrooms[index] = newRoom;
      } else {
        classrooms.push(newRoom);
      }

      localStorage.setItem("mvgr_classrooms", JSON.stringify(classrooms));
      alert("Classroom saved successfully.");
      clearForm();
      loadTable();
    }

    function editRoom(id) {
      const classrooms = getClassrooms();
      const room = classrooms.find(r => r.id === id);
      if (!room) return;

      document.getElementById("formTitle").innerText = "Edit Classroom";
      document.getElementById("roomId").value = room.id;
      document.getElementById("roomNumber").value = room.roomNumber;
      document.getElementById("roomName").value = room.roomName;
      document.getElementById("department").value = room.department;
      document.getElementById("year").value = room.year || "1st Year";
      document.getElementById("section").value = room.section || "A";
      document.getElementById("roomType").value = room.roomType;
      document.getElementById("block").value = room.block;
      document.getElementById("floor").value = room.floor;
      document.getElementById("landmark").value = room.landmark || "";
      document.getElementById("indoorNotes").value = room.indoorNotes;
      document.getElementById("outdoorTargetId").value = room.outdoorTargetId;

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteRoom(id) {
      const ok = confirm("Are you sure you want to delete this classroom?");
      if (!ok) return;

      const classrooms = getClassrooms().filter(r => r.id !== id);
      localStorage.setItem("mvgr_classrooms", JSON.stringify(classrooms));
      loadTable();
    }

    function clearForm() {
      document.getElementById("formTitle").innerText = "Add Classroom";
      document.getElementById("roomId").value = "";
      document.getElementById("roomNumber").value = "";
      document.getElementById("roomName").value = "";
      document.getElementById("department").value = "";
      document.getElementById("year").value = "1st Year";
      document.getElementById("section").value = "A";
      document.getElementById("roomType").value = "Classroom";
      document.getElementById("block").value = "";
      document.getElementById("floor").value = "";
      document.getElementById("landmark").value = "";
      document.getElementById("indoorNotes").value = "";
      if (document.getElementById("outdoorTargetId").options.length > 0) {
        document.getElementById("outdoorTargetId").selectedIndex = 0;
      }
    }

    function resetData() {
      const ok = confirm("Reset all classroom data to demo defaults?");
      if (!ok) return;

      localStorage.setItem("mvgr_classrooms", JSON.stringify(defaultClassrooms));
      clearForm();
      loadTable();
      alert("Demo data restored.");
    }

    function goHome() {
      window.location.href = "index.html";
    }

    populateOutdoorTargets();
    loadTable();
  </script>
</body>
</html>
